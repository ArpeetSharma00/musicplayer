<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Music Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="player">
        <h2>Nature Music Player</h2>
        <input type="file" id="fileInput" accept="audio/*" multiple>

        <img id="album-art" src="forest.jpg" alt="Album Art">
        <h3 id="song-title">Song Name</h3>
        <audio id="audio-player" src=""></audio>
        <div class="controls">
            <button id="prev"><span>&#9665;</span></button>
            <button id="play-pause"><span>&#9654;</span></button>
            <button id="next"><span>&#9655;</span></button>
        </div>
        <div class="extras">
            <button id="shuffle">🔀</button>
            <button id="repeat">🔁</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
