<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Music Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="player">
        <h2>Nature Music Player</h2>
        <input type="file" id="fileInput" accept="audio/*" multiple>
<ul id="song-list"></ul> <!-- This is where songs will be displayed -->

        <input type="file" id="imageInput" accept="image/*">

        


        <img id="album-art" src="forest.jpg" alt="Album Art">
        <h3 id="song-title">Song Name</h3>
        <audio id="audio-player" src=""></audio>
         <div id="controls">
        <button id="prev"><i class="fas fa-backward"></i></button>
        <button id="play-pause"><i class="fas fa-play"></i></button>
        <button id="next"><i class="fas fa-forward"></i></button>
    </div>

    <div id="extra-controls">
        <button id="shuffle"><i class="fas fa-random"></i></button>
        <input type="range" id="progress-bar" value="0">
        <button id="repeat"><i class="fas fa-sync-alt"></i></button>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
