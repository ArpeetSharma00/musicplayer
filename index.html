<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Music Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Search Bar -->
        <input type="text" id="searchBar" placeholder="Search songs...">

        <!-- Upload Button -->
        <input type="file" id="fileInput" accept="audio/*" multiple>
        
        <!-- Song List -->
        <div id="songList"></div>

        <!-- Music Player -->
        <div id="playerContainer" class="hidden">
            <div id="albumContainer">
                <img id="albumArt" src="default-album.jpg" alt="Album Art">
            </div>
            <audio id="audioPlayer" controls></audio>

<!-- Ocean Wave Progress Bar -->
    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>
            
            <button id="playPauseBtn">▶</button>
            <button id="removeSongBtn">🗑 Remove Song</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
