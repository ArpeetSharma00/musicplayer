<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>EchoAltar Music Player</h1>

        <input type="file" id="fileInput" accept="audio/*" multiple>
        <input type="file" id="albumInput" accept="image/*">
        <input type="text" id="searchBar" placeholder="Search for a song...">

        <div id="songList"></div>

        <div id="playerContainer" class="hidden">
            <img id="albumArt" src="default-album.jpg" alt="Album Art">
            <audio id="audioPlayer" controls></audio>
            <div class="waveform"></div>
            <div class="controls">
                <button id="prevBtn">⏮</button>
                <button id="playPauseBtn">▶</button>
                <button id="nextBtn">⏭</button>
            </div>
            <div id="progressBarContainer">
                <div id="progressBar"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
