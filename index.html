<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Music Player</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
</head>
<body>
    <div class="music-player">
        <header>
            <h1>Nature Music</h1>
            <input type="text" id="search-bar" placeholder="Search for a song...">
        </header>

        <div id="playlist">
            <h2>Your Playlist</h2>
            <ul id="playlist-items"></ul>
        </div>

        <div id="player-container" class="hidden">
            <h2 id="now-playing">Now Playing: <span id="song-title"></span></h2>
            <audio id="audio-player" controls></audio>
        </div>

        <audio id="audio-player"></audio>

            <div class="controls">
                <button id="prev-btn">⏮️</button>
                <button id="play-pause-btn">▶️</button>
                <button id="next-btn">⏭️</button>
            </div>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" value="0" min="0" max="100">
                <span id="duration">0:00</span>
            </div>
        </div>


        <div id="login-section">
            <button id="google-login">Login with Google</button>
            <button id="facebook-login">Login with Facebook</button>
            <button id="phone-login">Login with Phone</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
