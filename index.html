<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Music Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Search Bar -->
    <input type="text" id="searchBar" placeholder="Search for a song...">

    <!-- File Upload for Songs -->
    <input type="file" id="fileInput" accept="audio/*">
    
    <!-- List of Songs -->
    <ul id="songList"></ul>

    <!-- Music Player -->
    <div id="playerContainer">
        <div id="albumArtContainer">
            <img id="albumArtImg" src="default_album.png" alt="Album Art">
        </div>
        <audio id="audioPlayer" controls></audio>
        <div id="progressBar"></div>
        <button id="playPauseBtn">▶</button>
    </div>

    <!-- Lyrics Display -->
    <div id="lyricsContainer">
        <div id="lyricsText">Lyrics will appear here...</div>
        <img id="leaf" src="leaf.png" alt="Leaf">
    </div>

    <!-- Clear All Button -->
    <button onclick="clearAllSongs()">Clear All Songs</button>

    <script src="script.js"></script>
</body>
</html>
