<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoAltar - Nature Music</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>EchoAltar</h1>
        <input type="text" id="searchBar" placeholder="Search for a song...">
    </header>

    <main>
        <section class="trending">
            <h2>Trending Songs</h2>
            <ul id="trendingList">
                <li onclick="openPlayer('Whispering Winds', 'whispering.jpg', 'song1.mp3')">🌿 Whispering Winds - Nature Beats</li>
                <li onclick="openPlayer('Ocean\'s Lullaby', 'ocean.jpg', 'song2.mp3')">🌊 Ocean's Lullaby - Serenity Sounds</li>
                <li onclick="openPlayer('Campfire Echoes', 'campfire.jpg', 'song3.mp3')">🔥 Campfire Echoes - Wild Harmony</li>
                <li onclick="openPlayer('Sunrise Melody', 'sunrise.jpg', 'song4.mp3')">🌄 Sunrise Melody - Zen Tones</li>
            </ul>
        </section>

        <section class="playlists">
            <h2>Top Playlists</h2>
            <div class="playlist-container">
                <div class="playlist">🌲 Forest Calm</div>
                <div class="playlist">🌅 Sunset Vibes</div>
                <div class="playlist">🌧️ Rainy Day Chill</div>
                <div class="playlist">🏔️ Mountain Echoes</div>
            </div>
        </section>
    </main>

    <!-- Music Player Pop-up -->
    <div id="musicPlayer" class="player-popup">
        <div class="player-content">
            <span class="close-btn" onclick="closePlayer()">✖</span>
            <img id="albumArt" src="default.jpg" alt="Album Art">
            <h3 id="songTitle">Now Playing</h3>
            <audio id="audioPlayer" controls>
                <source id="audioSource" src="" type="audio/mp3">
            </audio>
            <input type="range" id="progressBar" value="0" max="100">
            <div class="controls">
                <button id="repeatBtn">🔁</button>
                <button id="likeBtn">❤️</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
