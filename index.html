<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoAltar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>EchoAltar 🎶</h1>
        <input type="text" id="searchBar" placeholder="Search songs...">
    </header>

    <button onclick="logout()">Logout</button>

    <input type="file" id="songUpload" accept="audio/*" style="display: none;">
    <button id="uploadBtn" onclick="document.getElementById('songUpload').click()" style="display: none;">Upload Song</button>

    <h2>Trending Songs</h2>
    <ul id="trendingList"></ul>

    <h2>Top Playlists</h2>
    <ul id="playlistList"></ul>

    <div id="musicPlayer" class="hidden">
        <button id="closePlayer">X</button>
        <img id="albumArt" src="" alt="Album Art">
        <h3 id="songTitle">Now Playing</h3>
        <audio id="audioPlayer">
            <source id="audioSource" src="" type="audio/mp3">
        </audio>
        <button id="likeBtn">❤️</button>
        <button id="repeatBtn">🔁</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
