<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EchoAltar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Enter Username">
        <input type="password" id="loginPassword" placeholder="Enter Password">
        <button onclick="checkLogin()">Login</button>
        <p id="loginMessage"></p>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>

    <script>
        function checkLogin() {
            const enteredUsername = document.getElementById("loginUsername").value;
            const enteredPassword = document.getElementById("loginPassword").value;

            const storedUsername = localStorage.getItem("adminUsername");
            const storedPassword = localStorage.getItem("adminPassword");

            if (enteredUsername === storedUsername && enteredPassword === storedPassword) {
                localStorage.setItem("isAdmin", "true");
                window.location.href = "index.html"; // Redirect to main website
            } else {
                document.getElementById("loginMessage").textContent = "Incorrect username or password!";
            }
        }

        // If already logged in, go to the main website
        if (localStorage.getItem("isAdmin") === "true") {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
